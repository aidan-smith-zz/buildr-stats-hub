# One scheduled run per calendar day: warm-today → warm-tomorrow (--one) → warm-league-stats.
# That still produces many Vercel hits to /api/fixtures/[id]/warm (several per fixture); that is expected.
# Manual runs: Actions → Daily Warm Jobs → Run workflow → pick a mode.
name: Daily Warm Jobs

on:
  schedule:
    # Once daily, UTC (time is arbitrary; adjust if you prefer another quiet window).
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scheduled default is full daily chain. Pick a single job for one-off runs."
        required: true
        default: full-daily
        type: choice
        options:
          - full-daily
          - run-all
          - warm-today
          - warm-tomorrow-one
          - warm-league-stats

concurrency:
  group: daily-warm-jobs
  cancel-in-progress: false

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BASE_URL: ${{ secrets.WARM_BASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FOOTBALL_API_BASE_URL: ${{ secrets.FOOTBALL_API_BASE_URL }}
      FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Validate secrets for selected mode
        shell: bash
        run: |
          set -e
          EVENT="${{ github.event_name }}"
          MODE="${{ github.event.inputs.mode }}"
          if [ "$EVENT" = "schedule" ]; then
            MODE="full-daily"
          fi
          echo "event=${EVENT} effective_mode=${MODE}"

          need_base=0
          need_db=0
          case "$MODE" in
            full-daily|run-all)
              need_base=1
              need_db=1
              ;;
            warm-today|warm-tomorrow-one)
              need_base=1
              ;;
            warm-league-stats)
              need_db=1
              ;;
            *)
              echo "Unknown mode: ${MODE}"
              exit 1
              ;;
          esac

          if [ "$need_base" = "1" ] && [ -z "${BASE_URL}" ]; then
            echo "Missing BASE_URL (repository secret WARM_BASE_URL)."
            exit 1
          fi
          if [ "$need_db" = "1" ] && [ -z "${DATABASE_URL}" ]; then
            echo "Missing DATABASE_URL (repository secret)."
            exit 1
          fi

      - name: Run warm commands
        shell: bash
        run: |
          set -e
          EVENT="${{ github.event_name }}"
          MODE="${{ github.event.inputs.mode }}"
          if [ "$EVENT" = "schedule" ]; then
            echo "Scheduled run: full daily chain (once per day)."
            npm run warm-today
            npm run warm-tomorrow -- --one
            npm run warm-league-stats
            exit 0
          fi

          case "$MODE" in
            full-daily|run-all)
              npm run warm-today
              npm run warm-tomorrow -- --one
              npm run warm-league-stats
              ;;
            warm-today)
              npm run warm-today
              ;;
            warm-tomorrow-one)
              npm run warm-tomorrow -- --one
              ;;
            warm-league-stats)
              npm run warm-league-stats
              ;;
            *)
              echo "Unknown mode: ${MODE}"
              exit 1
              ;;
          esac
